title = "auto-flow gitleaks config"

[allowlist]
  description = "Allow documentation files that reference secret patterns"
  paths = [
    '''documents/requirements\.md''',
    '''documents/design\.md''',
    '''\.auto-flow/agents/agent-.*/SKILL\.md''',
    '''\.auto-flow/tasks/.*\.md''',
    '''\.auto-flow/runs/.*''',
    '''CLAUDE\.md''',
    '''AGENTS\.md''',
  ]
